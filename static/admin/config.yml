backend:
  name: github
  repo: usjunco/pathogens_mx # Replace with your project path
  branch: main # or master

media_folder: "static/images" # Where images are stored
public_folder: "/images"      # The URL path Hugo uses for images

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts" # Path to your markdown files
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
